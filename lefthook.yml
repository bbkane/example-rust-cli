# EXAMPLE USAGE:
#
#   Refer to explanation at:
#   https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  commands:
    cargo-fmt:
      run: cargo fmt --check
    cargo-check:
      run: cargo check --all-targets --all-features
    cargo-clippy:
      run: cargo clippy --all-targets --all-features -- -D warnings
    cargo-test:
      run: cargo test
  parallel: true
